<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InternLink – Kigali</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <nav>
    <div class="brand"><a href="/" style="color:inherit; text-decoration:none;">InternLink</a></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/internships">Internships</a>
        
        <a href="/login" id="nav-login">Login</a>
        <a href="/register" id="nav-register" class="btn-nav">Sign Up</a>
        
        <a href="/dashboard" id="nav-dash" style="display:none;">Dashboard</a>
        <a onclick="logout()" id="nav-logout" style="display:none; cursor:pointer;">Logout</a>
    </div>
  </nav>

  <div id="toast" class="toast"></div>

  <main class="page active">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
