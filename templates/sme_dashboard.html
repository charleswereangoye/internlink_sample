{% extends "base.html" %}
{% block content %}
<h2>Employer Dashboard</h2>
<p>Welcome to the SME Portal. Post a new local internship below.</p>

<div class="auth-box" style="max-width: 600px; margin: 30px 0;">
  <h3>Post a New Internship</h3>
  
  <input id="post-title" type="text" placeholder="Internship Title (e.g., Software Developer Intern)">
  
  <textarea id="post-desc" placeholder="Job Description..." style="padding: 10px; border-radius: 6px; border: none; font-family: inherit; resize: vertical; min-height: 80px;"></textarea>
  
  <input id="post-location" type="text" placeholder="Location (e.g., Kigali, Rwanda)">
  
  <div style="display: flex; gap: 10px;">
    <div style="flex: 1;">
      <label style="font-size: 12px; color: #8b91a8;">Start Date</label>
      <input id="post-start" type="date" style="width: 100%; box-sizing: border-box;">
    </div>
    <div style="flex: 1;">
      <label style="font-size: 12px; color: #8b91a8;">End Date</label>
      <input id="post-end" type="date" style="width: 100%; box-sizing: border-box;">
    </div>
  </div>
  
  <button class="btn" onclick="postInternship()">Publish Internship</button>
</div>
<h3 style="margin-top: 50px; border-top: 1px solid #272c3d; padding-top: 20px;">Review Candidates</h3>
<div id="sme-applications-container" class="internship-list">
  </div>
{% endblock %}
