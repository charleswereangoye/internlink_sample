<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InternLink – Student Dashboard</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <nav>
    <div id="nav-logo" class="brand" style="cursor:pointer;">InternLink</div>
    <div class="nav-links">
        <span id="nav-home-wrapper"><a href="index.html" id="nav-home">Home</a></span>
        <a href="dashboard.html" id="nav-dash" style="display:none;">Dashboard</a>
        <a href="listing.html">Internships</a>
        <a href="login.html" id="nav-login">Login</a>
        <a href="register.html" id="nav-register">Sign Up</a>
        <a onclick="logout()" id="nav-logout" style="display:none; cursor:pointer;">Logout</a>
        <button id="theme-toggle" class="btn-nav theme-toggle" type="button" onclick="toggleTheme()" aria-label="Toggle light/dark theme">Theme</button>
    </div>
  </nav>

  <div id="toast" class="toast"></div>

  <main class="page active">
    <h2>Student Dashboard</h2>
    <p>Welcome back! Update your skill profile and track your applications below.</p>

    <div class="dashboard-card">
      <h3>My Skill Profile</h3>
      
      <div class="form-row">
        <div class="form-group">
          <label>University</label>
          <input id="prof-uni" type="text" placeholder="e.g., ALU">
        </div>
        <div class="form-group">
          <label>Major</label>
          <input id="prof-major" type="text" placeholder="e.g., Software Engineering">
        </div>
        <div class="form-group">
          <label>Grad Year</label>
          <input id="prof-year" type="number" placeholder="e.g., 2026">
        </div>
      </div>
      
      <div class="form-group" style="margin-bottom: 25px;">
        <label>Technical & Soft Skills</label>
        <input id="prof-skills" type="text" placeholder="Comma separated (e.g., HTML, CSS, Javascript, Python)">
      </div>
      
      <button id="btn-save-profile" class="btn btn-save" onclick="updateProfile()">Save Profile</button>
      <button id="btn-edit-profile" class="btn btn-save" style="display: none;" onclick="toggleProfileEdit(true)">Edit Profile</button>
    </div>

    <div class="dashboard-card">
      <h3>Application Status Overview</h3>
      <div style="height: 260px; position: relative; width: 100%;">
        <canvas id="applications-chart"></canvas>
      </div>
    </div>

    <h3 class="section-title">My Applications</h3>
    <div id="student-applications-container" class="internship-list">
      </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  
  <script src="js/script.js"></script>
</body>
</html>
