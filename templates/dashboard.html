{% extends "base.html" %}
{% block content %}
<h2>Student Dashboard</h2>
<p>Welcome back! Update your skill profile and track your applications below.</p>

<div class="dashboard-card">
  <h3>My Skill Profile</h3>
  
  <div class="form-row">
    <div class="form-group">
      <label>University</label>
      <input id="prof-uni" type="text" placeholder="e.g., ALU">
    </div>
    <div class="form-group">
      <label>Major</label>
      <input id="prof-major" type="text" placeholder="e.g., Software Engineering">
    </div>
    <div class="form-group">
      <label>Grad Year</label>
      <input id="prof-year" type="number" placeholder="e.g., 2026">
    </div>
  </div>
  
  <div class="form-group" style="margin-bottom: 25px;">
    <label>Technical & Soft Skills</label>
    <input id="prof-skills" type="text" placeholder="Comma separated (e.g., HTML, CSS, Javascript, Python)">
  </div>
  
  <button id="btn-save-profile" class="btn btn-save" onclick="updateProfile()">Save Profile</button>
  <button id="btn-edit-profile" class="btn btn-save" style="display: none;" onclick="toggleProfileEdit(true)">Edit Profile</button>
</div>

<div class="dashboard-card">
  <h3>Application Status Overview</h3>
  <div style="height: 260px; position: relative; width: 100%;">
    <canvas id="applications-chart"></canvas>
  </div>
</div>

<h3 class="section-title">My Applications</h3>
<div id="student-applications-container" class="internship-list">
  </div>
{% endblock %}
