<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InternLink – Login</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <nav>
    <div id="nav-logo" class="brand" style="cursor:pointer;">InternLink</div>
    <div class="nav-links">
        <span id="nav-home-wrapper"><a href="index.html" id="nav-home">Home</a></span>
        <a href="dashboard.html" id="nav-dash" style="display:none;">Dashboard</a>
        <a href="listing.html">Internships</a>
        <a href="login.html" id="nav-login">Login</a>
        <a href="register.html" id="nav-register">Sign Up</a>
        <a onclick="logout()" id="nav-logout" style="display:none; cursor:pointer;">Logout</a>
        <button id="theme-toggle" class="btn-nav theme-toggle" type="button" onclick="toggleTheme()" aria-label="Toggle light/dark theme">Theme</button>
    </div>
  </nav>

  <div id="toast" class="toast"></div>

  <main class="page active">
    <div class="auth-box">
      <h2>Login</h2>
      <input id="login-email" type="email" placeholder="Email">
      <input id="login-password" type="password" placeholder="Password">
      <button class="btn" onclick="login()">Login</button>
      
      <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  
  <script src="js/script.js"></script>
</body>
</html>
