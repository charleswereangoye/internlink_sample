<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InternLink – Kigali</title>
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("theme");
        var theme = (saved === "light" || saved === "dark") ? saved : "dark";
        document.documentElement.dataset.theme = theme;
        
        // Prevent logged-in users from seeing the landing page if they type the URL
        var isLoggedIn = localStorage.getItem("loggedIn");
        var userRole = localStorage.getItem("userRole");
        if (isLoggedIn === "true" && window.location.pathname === "/") {
          window.location.href = (userRole === "sme") ? "/sme_dashboard" : "/dashboard";
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <nav>
    <div id="nav-logo" class="brand" style="cursor:pointer;">InternLink</div>
    
    <div class="nav-links">
        <span id="nav-home-wrapper"><a href="/" id="nav-home">Home</a></span>
        
        <a href="/dashboard" id="nav-dash" style="display:none;">Dashboard</a>
        
        <a href="/internships">Internships</a>
        
        <a href="/login" id="nav-login">Login</a>
        
        <a href="/register" id="nav-register">Sign Up</a>
        
        <a onclick="logout()" id="nav-logout" style="display:none; cursor:pointer;">Logout</a>

        <button id="theme-toggle" class="btn-nav theme-toggle" type="button" onclick="toggleTheme()" aria-label="Toggle light/dark theme">
          Theme
        </button>
    </div>
  </nav>

  <div id="toast" class="toast"></div>

  <main class="page active">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/static/script.js"></script>
</body>
</html>
