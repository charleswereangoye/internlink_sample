<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InternLink – Register</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <nav>
    <div id="nav-logo" class="brand" style="cursor:pointer;">InternLink</div>
    <div class="nav-links">
        <span id="nav-home-wrapper"><a href="index.html" id="nav-home">Home</a></span>
        <a href="dashboard.html" id="nav-dash" style="display:none;">Dashboard</a>
        <a href="listing.html">Internships</a>
        <a href="login.html" id="nav-login">Login</a>
        <a href="register.html" id="nav-register">Sign Up</a>
        <a onclick="logout()" id="nav-logout" style="display:none; cursor:pointer;">Logout</a>
        <button id="theme-toggle" class="btn-nav theme-toggle" type="button" onclick="toggleTheme()" aria-label="Toggle light/dark theme">Theme</button>
    </div>
  </nav>

  <div id="toast" class="toast"></div>

  <main class="page active">
    <div class="auth-box">
      <h2>Create Account</h2>

      <select id="register-role" onchange="toggleCompanyField()" style="padding: 10px; border-radius: 6px; border: none; margin-bottom: 10px; background: white; color: black;">
        <option value="student">I am a Student</option>
        <option value="sme">I am an Employer (SME)</option>
      </select>

      <input id="register-first" type="text" placeholder="First Name">
      <input id="register-last" type="text" placeholder="Last Name">
      
      <input id="register-company" type="text" placeholder="Company Name" style="display: none;">

      <input id="register-email" type="email" placeholder="Email">
      <input id="register-password" type="password" placeholder="Password">
      
      <button class="btn" onclick="register()">Create Account</button>
      
      <p>Already registered? <a href="login.html">Login</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  
  <script>
    function toggleCompanyField() {
      const role = document.getElementById("register-role").value;
      const companyInput = document.getElementById("register-company");
      if (role === "sme") {
        companyInput.style.display = "block";
      } else {
        companyInput.style.display = "none";
      }
    }
  </script>

  <script src="js/script.js"></script>
</body>
</html>
