<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InternLink – Available Internships</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <nav>
    <div id="nav-logo" class="brand" style="cursor:pointer;">InternLink</div>
    <div class="nav-links">
        <span id="nav-home-wrapper"><a href="index.html" id="nav-home">Home</a></span>
        <a href="dashboard.html" id="nav-dash" style="display:none;">Dashboard</a>
        <a href="listing.html">Internships</a>
        <a href="login.html" id="nav-login">Login</a>
        <a href="register.html" id="nav-register">Sign Up</a>
        <a onclick="logout()" id="nav-logout" style="display:none; cursor:pointer;">Logout</a>
        <button id="theme-toggle" class="btn-nav theme-toggle" type="button" onclick="toggleTheme()" aria-label="Toggle light/dark theme">Theme</button>
    </div>
  </nav>

  <div id="toast" class="toast"></div>

  <main class="page active">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
      <div>
        <h2>Available Internships</h2>
        <p>Browse live internships from our local SMEs and global partners.</p>
      </div>
      
      <button id="match-me-btn" class="btn" style="display: none; margin-bottom: 20px;" onclick="matchInternships()">
        Match Me!
      </button>
    </div>

    <div id="api-jobs-container" class="internship-list">
      <p>Loading live jobs...</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  
  <script src="js/script.js"></script>
</body>
</html>
